input {
  http {
    port => 8085
    codec => json
  }
}

filter {
  # Drop healthcheck probes
  if ([headers][request_method] == "GET") {
    drop {}
  }

  ### Remove unneeded fields coming from fluent-bit
  mutate {
    remove_field => ["date", "headers", "_p"]
    rename => { "time" => "fluentbit_ingest_timestamp" }
  }

  ### Extract log_name and log_string from the log path prefix
  if ([log] =~ /^\/opt\/out\/instance\/log/) {
    grok {
      match => {
        "log" => [ "^\/opt\/out\/instance\/log\/%{DATA:log_name}(\.log)?(\.out)? %{GREEDYDATA:log_string}" ]
      }
      remove_field => ["log"]
    }
  }

  # Only process PF audit logs
  if [log_name] != "audit" {
    drop {}
  }

  mutate {
    remove_field => ["log_name"]
  }

  ### Parse pipe-delimited audit log fields.
  ### Only fields required by the output spec are captured; all others are skipped with %{}.
  dissect {
    mapping => {
      "log_string" => "%{Timestamp}| %{}| %{EventType}| %{UserID}| %{} | %{}| %{ConnectionId}| %{}| %{}| %{}| %{}| %{}| %{}| %{->}"
    }
    remove_field => ["log_string"]
  }

  ### Drop empty fields
  ruby {
    code => '
      hash = event.to_hash
      hash.each do |k,v|
        if v == "" || v == nil
          event.remove(k)
        end
      end
    '
  }

  # Hash PII fields in place
  fingerprint {
    source => "UserID"
    target => "UserID"
    method => "SHA256"
  }
  fingerprint {
    source => "ConnectionId"
    target => "ConnectionId"
    method => "SHA256"
  }

  # Add enrichment fields
  mutate {
    add_field => {
      "Product"      => "PingFederate"
      "SalesforceId" => "${SALESFORCE_ID:}"
    }
  }
}

output {
  # TODO: remove before merging — debug output to inspect raw event structure in logstash logs
  stdout {
    codec => rubydebug
  }

  s3 {
    region => "${AWS_REGION}"
    bucket => "${DATALAKE_BUCKET_URI}"
    prefix => "p1as-pingfederate/%{+YYYY}/%{+MM}/%{+dd}"
    time_file => "3"
    size_file => "104857600"
    codec => "json_lines"
    id => "datalake_s3_out"
  }
}
