apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: logstash-elasic-compliance
  namespace: elastic-stack-logging
spec:
  template:
    spec:
      containers:
      - name: logstash
        env:
        - name: LS_JAVA_OPTS
          value: >-
            -Xms2g -Xmx2g -XX:MaxDirectMemorySize=1g
            -Djava.io.tmpdir=/usr/share/logstash/data/tmp
        readinessProbe:
          httpGet:
            port: 8085
        startupProbe:
          httpGet:
            port: 8085
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "2"
            memory: 4Gi
        ports:
        - containerPort: 8085
          name: http-lake-in
          protocol: TCP
        - containerPort: 8086
          name: http-hipaa-in
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: logstash-elasic-compliance
  namespace: elastic-stack-logging
spec:
  ports:
  - port: 9600
    name: rest
  - port: 9198
    name: metrics
  - port: 8085
    name: http-lake-in
  - port: 8086
    name: http-hipaa-in
