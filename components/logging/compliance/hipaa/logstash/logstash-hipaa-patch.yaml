apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: logstash-elasic-compliance
  namespace: elastic-stack-logging
spec:
  template:
    spec:
      containers:
      - name: logstash
        readinessProbe:
          httpGet:
            port: 8086
        startupProbe:
          httpGet:
            port: 8086
        ports:
        - containerPort: 8086
          name: http-hipaa-in
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: logstash-elasic-compliance
  namespace: elastic-stack-logging
spec:
  ports:
  - port: 9600
    name: rest
  - port: 9198
    name: metrics
  - port: 8086
    name: http-hipaa-in
