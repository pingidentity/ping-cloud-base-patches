apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: logstash-elastic
spec:
  volumeClaimTemplates:
    - metadata:
        name: logstash-gp3
      spec:
        resources:
          requests:
            storage: 40Gi
  template:
    spec:
      containers:
        - name: logstash
          resources:
            limits:
              cpu: "6"
              memory: 16Gi
            requests:
              cpu: "6"
              memory: 16Gi
          env:
            - name: LS_JAVA_OPTS
              value: >-
                -Xms9000m -Xmx9000m -XX:MaxDirectMemorySize=2g
                -Djava.io.tmpdir=/usr/share/logstash/data/tmp
                -Dlogstash.geoip.database.path=/usr/share/logstash/data/plugins/filters/geoip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipelines
data:
  pipelines.yml: |
    - pipeline.id: main
      path.config: "/usr/share/logstash/pipeline/main"
      pipeline.workers: 4
      pipeline.batch.size: 2000
      pipeline.batch.delay: 100
      queue.type: persisted
      queue.max_bytes: 10gb
      queue.drain: true
      queue.checkpoint.writes: 1024
      dead_letter_queue.enable: true
    - pipeline.id: customer
      path.config: "/usr/share/logstash/pipeline/customer"
      pipeline.workers: 3
      pipeline.batch.size: 2000
      pipeline.batch.delay: 100
      queue.type: persisted
      queue.max_bytes: 10gb
      queue.drain: true
      queue.checkpoint.writes: 1024
      dead_letter_queue.enable: false
    - pipeline.id: dlq
      path.config: "/usr/share/logstash/pipeline/dlq"
      pipeline.workers: 1
      pipeline.batch.size: 500
      pipeline.batch.delay: 50
      queue.type: persisted
      queue.max_bytes: 5gb
      queue.drain: true
      queue.checkpoint.writes: 1
      dead_letter_queue.enable: false
