# AI Generated
name: Mirror to pingidentity/ping-cloud-base-patches

on:
  push:
    branches: ['**']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror branch (Deploy Key)
        env:
          # Refer to the ref_name this way due to injection concerns - https://www.kenmuse.com/blog/the-hidden-danger-in-git-ref-names/
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Adding SSH Key... from repo secret 'MIRROR_DEPLOY_KEY'"
          mkdir -p ~/.ssh
          echo "${{ secrets.MIRROR_DEPLOY_KEY }}" > ~/.ssh/mirror_deploy_key
          chmod 600 ~/.ssh/mirror_deploy_key

          echo "Adding github.com to known hosts..."
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          echo "Mirroring $REF_NAME to the ping-cloud-base-patches repo in Public Github..."
          GIT_SSH_COMMAND="ssh -i ~/.ssh/mirror_deploy_key" \
            git push git@github.com:pingidentity/ping-cloud-base-patches.git HEAD:refs/heads/"$REF_NAME"
