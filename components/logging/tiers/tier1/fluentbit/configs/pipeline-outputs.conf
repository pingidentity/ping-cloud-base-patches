# =============================================================================
# pipeline-outputs.conf
# Ref: https://pingidentity.atlassian.net/wiki/spaces/PDA/pages/2712305794/FluentBit+Pipeline+Configuration
#
# Four completely isolated output paths — each output matches ONLY its own
# tag namespace so no chunk pool is shared between outputs.
#
# ISOLATION GUARANTEE:
#   app_opensearch_out    → Match elk.kube.*   — POOL A only
#   app_s3_archive_out    → Match elk.s3.*     — POOL B only
#   app_customer_out      → Match elk.cust.*   — POOL C only
#   infra_s3_archive_out  → Match s3.kube.*    — POOL D only
#
# A dead endpoint on any output fills only its own storage.total_limit_size
# budget and has zero effect on the other three outputs.
# =============================================================================

# ── POOL A — MAIN / OPENSEARCH ─────────────────────────────────────────────
# Receives: elk.kube.general.* events only
# Destination: Logstash-Elastic :8080 → OpenSearch

[OUTPUT]
    Name                http
    Alias               app_opensearch_out
    Match               elk.kube.*
    workers             1
    Host                logstash-elastic.elastic-stack-logging
    Port                8080
    Format              json
    Retry_Limit         15
    compress            gzip
    net.keepalive_idle_timeout  10
    net.keepalive_max_recycle   100
    storage.total_limit_size    1000M

# ── POOL B — S3 ELK ARCHIVE ────────────────────────────────────────────────
# Receives: elk.s3.general.* events only
# Destination: Logstash-S3 :8081 → S3

[OUTPUT]
    Name                http
    Alias               app_s3_archive_out
    Match               elk.s3.*
    workers             1
    Host                logstash-elastic-s3.elastic-stack-logging
    Port                8081
    Format              json
    Retry_Limit         300
    compress            gzip
    net.keepalive_idle_timeout  10
    net.keepalive_max_recycle   100
    storage.total_limit_size    2000M

# ── POOL C — CUSTOMER ISOLATED PATH ───────────────────────────────────────
# Receives: elk.cust.general.* events only
# Destination: Logstash-Elastic :8084 → Customer pipeline

[OUTPUT]
    Name                http
    Alias               app_customer_out
    Match               elk.cust.*
    workers             1
    Host                logstash-elastic.elastic-stack-logging
    Port                8084
    Format              json
    Retry_Limit         15
    compress            gzip
    net.keepalive_idle_timeout  10
    net.keepalive_max_recycle   100
    storage.total_limit_size    1000M

# ── POOL D — S3 INFRASTRUCTURE ARCHIVE ────────────────────────────────────
# Receives: s3.kube.* events only (kube-system, cert-manager, argocd, etc.)
# Destination: Logstash-S3 :8081 → S3

[OUTPUT]
    Name                http
    Alias               infra_s3_archive_out
    Match               s3.kube.*
    workers             1
    Host                logstash-elastic-s3.elastic-stack-logging
    Port                8081
    Format              json
    Retry_Limit         300
    compress            gzip
    net.keepalive_idle_timeout  10
    net.keepalive_max_recycle   100
    storage.total_limit_size    2000M
