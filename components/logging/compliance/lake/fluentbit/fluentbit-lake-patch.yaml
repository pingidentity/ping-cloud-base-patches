apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
spec:
  template:
    spec:
      containers:
      - name: fluent-bit
        volumeMounts:
        - name: fluent-bit-pipeline-lake-inputs
          mountPath: /fluent-bit/etc/pipeline-lake-inputs.conf
          subPath: pipeline-lake-inputs.conf
        - name: fluent-bit-pipeline-lake-outputs
          mountPath: /fluent-bit/etc/pipeline-lake-outputs.conf
          subPath: pipeline-lake-outputs.conf
      volumes:
      - name: fluent-bit-pipeline-lake-inputs
        configMap:
          name: fluent-bit-pipeline-lake-inputs
      - name: fluent-bit-pipeline-lake-outputs
        configMap:
          name: fluent-bit-pipeline-lake-outputs
