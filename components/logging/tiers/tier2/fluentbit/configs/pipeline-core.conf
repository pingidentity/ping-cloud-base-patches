# =============================================================================
# FILTERS
# Each tag namespace has its own filter chain.
# An event only passes through filters whose Match pattern covers its tag.
# elk.kube.general.* events skip all elk.s3.*, elk.cust.*, s3.kube.* filters.
# =============================================================================

# ── MULTILINE ASSEMBLY ─────────────────────────────────────────────────────
# Assembles multi-line log entries (Java stack traces, etc.) for ping-cloud.
# emitter_name is a plugin instance label — NOT an event tag.
# Re-emitted events carry their original tag unchanged.

[FILTER]
    Name                  multiline
    match                 elk.kube.*_ping-cloud_*
    multiline.key_content log
    buffer                true
    flush_ms              2000
    emitter_name          elk.multiline
    emitter_storage.type  filesystem
    emitter_mem_buf_limit 2G
    multiline.parser      multiline_system_log

[FILTER]
    Name                  multiline
    match                 elk.s3.*_ping-cloud_*
    multiline.key_content log
    buffer                true
    flush_ms              2000
    emitter_name          elk.s3.multiline
    emitter_storage.type  filesystem
    emitter_mem_buf_limit 2G
    multiline.parser      multiline_system_log

[FILTER]
    Name                  multiline
    match                 elk.cust.*_ping-cloud_*
    multiline.key_content log
    buffer                true
    flush_ms              2000
    emitter_name          elk.cust.multiline
    emitter_storage.type  filesystem
    emitter_mem_buf_limit 2G
    multiline.parser      multiline_system_log

# ── KUBERNETES ENRICHMENT — POOL A (elk.kube.general.*) ───────────────────

[FILTER]
    Name                kubernetes
    Match               elk.kube.general.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_Tag_Prefix     elk.kube.general.var.log.containers.
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off
    Annotations         Off
    Labels              Off
    Buffer_Size         0
    Cache_Use_Docker_Id On
    Kube_Meta_Cache_TTL 1800

[FILTER]
    Name          nest
    Match         elk.kube.general.*
    Operation     lift
    Nested_under  kubernetes
    Add_prefix    k8s_

[FILTER]
    Name        record_modifier
    Match       elk.kube.general.*
    Remove_key  k8s_pod_id
    Remove_key  k8s_host
    Remove_key  k8s_docker_id
    Remove_key  k8s_container_hash

[FILTER]
    Name           nest
    Match          elk.kube.general.*
    Operation      nest
    Wildcard       k8s_*
    Nest_under     kubernetes
    Remove_prefix  k8s_

