# =============================================================================
# pipeline-core.conf
# Ref https://pingidentity.atlassian.net/wiki/spaces/PDA/pages/2712305794/FluentBit+Pipeline+Configuration
#
# Three-way isolated pipeline — complete chunk pool separation
#
# ISOLATION MODEL:
#   POOL A  elk.kube.general.*   → app_opensearch_out    (:8080 OpenSearch)
#   POOL B  elk.s3.general.*     → app_s3_archive_out    (:8081 S3)
#   POOL C  elk.cust.general.*   → app_customer_out      (:8084 Customer)
#   POOL D  s3.kube.*            → infra_s3_archive_out  (:8081 S3 infra)
#
# A failure on any pool can only affect its own output.
# Same log files are read 3× for elk paths — each with a unique DB file
# so read positions are tracked independently.
# =============================================================================

# ── S3 INFRASTRUCTURE INPUTS (POOL D) ─────────────────────────────────────
# System / infra logs that go ONLY to S3 archive.
# These are not sent to OpenSearch or the customer pipeline.

[INPUT]
    Name                tail
    Tag                 s3.kube.*
    Path                /var/log/containers/*_amazon-cloudwatch_*.log
    multiline.parser    docker, cri
    DB                  /fluent-bit/state/flb_s3_cw.db
    Skip_Long_Lines     Off
    Refresh_Interval    30
    Rotate_Wait         15
    Buffer_Chunk_Size   1M
    Buffer_Max_Size     4M
    Mem_Buf_Limit       16M
    storage.type        filesystem
    storage.pause_on_chunks_overlimit on
    Read_from_Head      ${READ_FROM_HEAD}

