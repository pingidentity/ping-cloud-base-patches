apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Ingress
      name: pingaccess-was-ingress
      namespace: ping-cloud
    patch: |
      - op: remove
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1enable-modsecurity
      - op: remove
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1modsecurity-snippet
  - target:
      kind: Deployment
      name: nginx-ingress-controller
      namespace: ingress-nginx-private
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nginx-ingress-controller
      spec:
        template:
          spec:
            containers:
              - name: nginx-ingress-controller
                image: 705370621539.dkr.ecr.us-west-2.amazonaws.com/pingcloud-services/sigsci-nginx-ingress-controller:PDO-11773
  - target:
      kind: Deployment
      name: nginx-ingress-controller
      namespace: ingress-nginx-public
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nginx-ingress-controller
      spec:
        template:
          spec:
            containers:
              - name: nginx-ingress-controller
                image: 705370621539.dkr.ecr.us-west-2.amazonaws.com/pingcloud-services/sigsci-nginx-ingress-controller:PDO-11773