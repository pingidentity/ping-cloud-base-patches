# =============================================================================
# logstash-s3.yaml
# Ref: https://pingidentity.atlassian.net/wiki/spaces/PDA/pages/2729934964/Logstash+Configuration
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipelines-s3
data:
  pipelines.yml: |
    - pipeline.id: s3
      path.config: "/usr/share/logstash/pipeline/s3"
      pipeline.workers: 4
      pipeline.batch.size: 2000
      pipeline.batch.delay: 100
      queue.type: persisted
      queue.max_bytes: 10gb
      queue.drain: true
      queue.checkpoint.writes: 1024
      dead_letter_queue.enable: false
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: logstash-elastic-s3
  labels:
    app: logstash-elastic-s3
spec:
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: logstash-elastic-s3
  template:
    metadata:
      labels:
        app: logstash-elastic-s3
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      serviceAccountName: logstash-elastic-s3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - logstash-elastic-s3
                topologyKey: "topology.kubernetes.io/zone"
      initContainers:
        - name: seed-logstash
          image: public.ecr.aws/r2h3l6e4/pingcloud-monitoring/logstash/dev:v2.3-release-branch-latest
          command: 
            - 'sh'
            - '-c'
            - |
              # Copy the default configs into the writable volume
              cp -r /usr/share/logstash/config/* /mnt/config/
              cp -r /usr/share/logstash/data/* /mnt/data/
              cp -r /tmp/* /mnt/tmp/              
              # Create logstash tmp directory
              mkdir -p /mnt/data/tmp
          volumeMounts:
            - name: logstash-config
              mountPath: /mnt/config
            - name: logstash-data
              mountPath: /mnt/data
            - name: tmp-dir
              mountPath: /mnt/tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            privileged: false
      containers:
        - name: exporter
          args:
          - --logstash.endpoint=http://localhost:9600
          image: public.ecr.aws/r2h3l6e4/pingcloud-clustertools/prom/logstash-exporter:v0.0.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9198
              name: metrics
              protocol: TCP
          resources:
            limits:
              cpu: "500m"
              memory: 500Mi
            requests:
              cpu: "150m"
              memory: 100Mi
        - name: logstash
          image: public.ecr.aws/r2h3l6e4/pingcloud-monitoring/logstash/dev:v2.3-release-branch-latest
          imagePullPolicy: Always
          command:
            - "/bin/sh"
          args:
            - "-c"
            - "S3_BUCKET_NAME=${S3_BUCKET#s3://} /usr/local/bin/docker-entrypoint"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
          env:
            - name: CONTAINER_NAME
              value: logstash
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CONFIG_RELOAD_AUTOMATIC
              value: 'false'
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: cluster-info
                  key: log.level
            - name: PIPELINE_ECS_COMPATIBILITY
              value: disabled
            - name: PIPELINE_ORDERED
              value: 'false'
            # Force the Ruby layer to use your writable data/tmp
            - name: TMPDIR
              value: "/usr/share/logstash/data/tmp"
            - name: LS_JAVA_OPTS
              # Heap/direct split sized for stable GC and IO buffer headroom.
              # Point Java/JRuby to a sub-folder inside our writable volume
              # This bypasses the world-writable /tmp logstash warning entirely
              value: >-
                -Xms6g -Xmx6g -XX:MaxDirectMemorySize=2g
                -Djava.io.tmpdir=/usr/share/logstash/data/tmp 
                -Dlogstash.geoip.database.path=/usr/share/logstash/data/plugins/filters/geoip
            - name: XPACK_MONITORING_ENABLED
              value: "false"
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: s3-raw-logs-bucket
                  key: bucketName
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: cluster-info
                  key: logs.region
            - name: CW_CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: cluster-info
                  key: cluster.name
          envFrom:
            - configMapRef:
                name: elk-environment-variables
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 300
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 10
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /
              port: 8081
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            # Guaranteed QoS (requests = limits).
            # Ensures dedicated CPU & Mem reservation for Logstash to avoid
            # CPU throttling &noisy-neighbor interference
            limits:
              cpu: "4"
              memory: 12Gi
            requests:
              cpu: "4"
              memory: 12Gi
          ports:
            - containerPort: 9600
              name: rest
              protocol: TCP
            - containerPort: 8081
              name: http-s3-input
              protocol: TCP
          volumeMounts:
            - name: logstash-data
              mountPath: /usr/share/logstash/data
            - name: tmp-dir
              mountPath: /tmp
            - name: logstash-config
              mountPath: /usr/share/logstash/config
            - name: logstash-logs
              mountPath: /usr/share/logstash/logs
            - name: logstash-pipelines-s3
              mountPath: /usr/share/logstash/config/pipelines.yml
              subPath: pipelines.yml
            - name: logstash-s3-gp3
              mountPath: /usr/share/logstash/data/queue
              readOnly: false
      terminationGracePeriodSeconds: 60
      volumes:
        - name: logstash-data
          emptyDir: {}
        - name: tmp-dir
          emptyDir: {}
        - name: logstash-config
          emptyDir: {}
        - name: logstash-logs
          emptyDir: {}
        - name: logstash-pipelines-s3
          configMap:
            name: logstash-pipelines-s3
            items:
              - key: pipelines.yml
                path: pipelines.yml
  serviceName: logstash-elastic-s3
  volumeClaimTemplates:
    - metadata:
        name: logstash-s3-gp3
        annotations:
          volume.autoscaler.kubernetes.io/scale-above-percent: "85"
          volume.autoscaler.kubernetes.io/scale-up-percent: "25"
        labels:
          app: logstash-elastic-s3
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: logstash-gp3
        resources:
          requests:
            storage: 20Gi

---
kind: Service
apiVersion: v1
metadata:
  name: logstash-elastic-s3
  labels:
    app: logstash-elastic-s3
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/scheme: "http"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9198"
    newrelic.io/scrape: "true"
spec:
  selector:
    app: logstash-elastic-s3
  ports:
    - port: 9600
      name: rest
    - port: 8081
      name: http-s3-input
    - port: 9198
      name: metrics

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logstash-elastic-s3
  labels:
    app: logstash-elastic-s3

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: logstash-elastic-s3
roleRef:
  kind: ClusterRole
  name: logstash-elastic
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: logstash-elastic-s3
