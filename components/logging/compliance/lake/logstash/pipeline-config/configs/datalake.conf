input {
  http {
    port => 8085
    codec => json
  }
}

filter {
  # Drop healthcheck probes
  if ([headers][request_method] == "GET") {
    drop {}
  }

  ### Remove unneeded fields coming from fluent-bit
  mutate {
    remove_field => ["date", "headers", "_p"]
    rename => { "time" => "fluentbit_ingest_timestamp" }
  }

  ### Parse the JSON log field emitted by PF
  json {
    source => "log"
    target => "pf"
    remove_field => ["log"]
  }

  # Only process PF audit logs
  if [pf][log_name] != "audit" {
    drop {}
  }

  ### Promote required schema fields from parsed JSON
  mutate {
    rename => {
      "[pf][timestamp]"    => "Timestamp"
      "[pf][event]"        => "EventType"
      "[pf][subject]"      => "UserId"
      "[pf][connectionId]" => "ConnectionId"
    }
    remove_field => ["pf"]
  }

  # Hash PII fields in place
  fingerprint {
    source => "UserId"
    target => "UserId"
    method => "SHA256"
  }
  fingerprint {
    source => "ConnectionId"
    target => "ConnectionId"
    method => "SHA256"
  }

  # Add enrichment fields
  mutate {
    add_field => {
      "Product"      => "PingFederate"
      "SalesforceId" => "${SALESFORCE_ID:}"
    }
  }

  ### Whitelist — drop everything not in the schema
  prune {
    whitelist_names => ["Timestamp", "EventType", "UserId", "ConnectionId", "Product", "SalesforceId"]
  }
}

output {
  # TODO: remove before merging — debug output to inspect raw event structure in logstash logs
  stdout {
    codec => rubydebug
  }

  s3 {
    region => "${AWS_REGION}"
    bucket => "${DATALAKE_BUCKET_URI}"
    prefix => "p1as-pingfederate/%{+YYYY}/%{+MM}/%{+dd}"
    time_file => "3"
    size_file => "104857600"
    codec => "json_lines"
    id => "datalake_s3_out"
  }
}
